    <!-- Set the theme class before first paint to avoid a light/dark flash. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('public-theme');
          var dark = s === 'dark' || (!s && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var el = document.documentElement;
          if (dark) { el.classList.add('dark'); el.style.colorScheme = 'dark'; }
          else { el.style.colorScheme = 'light'; }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Créez et gérez vos invitations digitales (mariage, anniversaire, cérémonie…) : QR code par invité, suivi RSVP en temps réel et paiement Mobile Money." />
