<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KPay Démo — Invitations</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 24px;
      }
      h1 { margin: 0; }
      .badge {
        background: #f59e0b;
        color: #1e293b;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        width: 240px;
        text-align: center;
      }
      .card h2 { margin: 0 0 8px; font-size: 18px; }
      .price { font-size: 32px; font-weight: 800; color: #38bdf8; margin: 8px 0 16px; }
      button {
        width: 100%;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: wait; }
      .note { color: #94a3b8; font-size: 13px; max-width: 420px; text-align: center; }
      .cur { font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>🎉 Mes Invitations <span class="badge">MODE TEST</span></h1>

    <div class="grid">
      <div class="card">
        <h2>Invitation Basic</h2>
        <div class="price">5 000 <small class="cur">XAF</small></div>
        <button type="button" onclick="pay('invite-basic', this)">Acheter</button>
      </div>
      <div class="card">
        <h2>Invitation Premium</h2>
        <div class="price">10 000 <small class="cur">XAF</small></div>
        <button type="button" onclick="pay('invite-premium', this)">Acheter</button>
      </div>
    </div>

    <p class="note">
      En cliquant sur « Acheter », tu seras redirigé vers la page de paiement
      sécurisée KPay (mode GATEWAY). En test, aucun argent réel n'est débité.
    </p>

    <script>
      async function pay(productId, btn) {
        btn.disabled = true;
        btn.textContent = "Redirection…";
        try {
          const res = await fetch("/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ productId }),
          });
          const data = await res.json();
          if (data.gatewayUrl) {
            window.location.href = data.gatewayUrl; // -> page KPay
          } else {
            alert("Erreur : " + (data.error || "inconnue"));
            btn.disabled = false;
            btn.textContent = "Acheter";
          }
        } catch (e) {
          alert("Erreur réseau : " + e.message);
          btn.disabled = false;
          btn.textContent = "Acheter";
        }
      }
    </script>
  </body>
</html>
