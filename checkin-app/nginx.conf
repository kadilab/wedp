server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # Reached via Caddy's "handle_path /checkin/*", which strips the prefix
    # before forwarding here - this server sees plain root-relative paths.
    # /api, /uploads and /socket.io are NOT proxied here: those requests use
    # root-absolute URLs (e.g. /api/...) so they never match /checkin/* at
    # the edge and go straight to the frontend container instead, which is
    # the single gateway to the backend.

    # Service worker must always be revalidated so app updates reach installed PWAs
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
